[tool.ruff]
target-version = "py312"
line-length = 120
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long — handled by ruff formatter
]

[tool.mypy]
python_version = "3.12"
files = ["src"]
strict = false
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
